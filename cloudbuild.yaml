steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        echo "Starting App Engine Deployment"
        gcloud config set project cgt-dev-471517
        gcloud app deploy app.yaml \
          --quiet \
          --no-promote \
          --version=v1-$(date +%s)

options:
  logging: CLOUD_LOGGING_ONLY
